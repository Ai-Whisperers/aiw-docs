name: Bug Report

about: Create a report to help us improve

title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        Please describe the bug clearly.

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What you expected to happen

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      placeholder: Paste any relevant log output

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: [e.g., Ubuntu 22.04]
        - Service version: [e.g., n8n 1.XX]
        - Date: YYYY-MM-DD
