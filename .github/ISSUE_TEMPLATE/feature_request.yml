name: Feature Request

about: Suggest an idea for this project

title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Description
        Describe the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem Solved
      placeholder: What problem does this solve?

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: How should it work?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Any alternative solutions?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Screenshots, mockups, references

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
